<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroPath AI - Stroke Rehabilitation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .auth-section {
            max-width: 500px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .stat-card p {
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 15px;
            border: none;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .session-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .progress-chart {
            width: 100%;
            height: 300px;
            background: #f5f5f5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 NeuroPath AI</h1>
            <p>AI-Powered Stroke Rehabilitation Platform</p>
        </div>

        <!-- Login/Register Section -->
        <div id="authSection" class="auth-section">
            <div class="card">
                <h2 style="margin-bottom: 20px; text-align: center;">Welcome</h2>
                
                <div id="alertBox"></div>

                <div class="form-group">
                    <label for="patientId">Patient ID</label>
                    <input type="text" id="patientId" placeholder="e.g., PATIENT001">
                </div>

                <div class="form-group">
                    <label for="patientName">Name</label>
                    <input type="text" id="patientName" placeholder="Your full name">
                </div>

                <button class="btn btn-primary" onclick="handleLogin()">Login / Create Account</button>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboardSection" class="dashboard">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>Welcome, <span id="userName"></span>! 👋</h2>
                    <button class="btn btn-secondary" onclick="handleLogout()" style="width: auto; padding: 10px 20px;">Logout</button>
                </div>

                <div id="dashboardAlert"></div>

                <!-- Stats Grid -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3 id="totalSessions">0</h3>
                        <p>Total Sessions</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="totalReps">0</h3>
                        <p>Total Reps</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="currentAngle">0°</h3>
                        <p>Current Range</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="improvement">+0°</h3>
                        <p>Improvement</p>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('exercise')">🏋️ Exercise</button>
                    <button class="tab" onclick="switchTab('progress')">📊 Progress</button>
                    <button class="tab" onclick="switchTab('predict')">🔮 Predictions</button>
                </div>

                <!-- Exercise Tab -->
                <div id="exerciseTab" class="tab-content active">
                    <h3 style="margin-bottom: 15px;">Log Exercise Session</h3>
                    
                    <div class="form-group">
                        <label>Exercise Type</label>
                        <input type="text" id="exerciseType" value="shoulder_raise">
                    </div>

                    <div class="form-group">
                        <label>Reps Completed</label>
                        <input type="number" id="reps" value="10" min="1">
                    </div>

                    <div class="form-group">
                        <label>Max Angle Achieved (degrees)</label>
                        <input type="number" id="maxAngle" value="120" min="0" max="180">
                    </div>

                    <div class="form-group">
                        <label>Duration (minutes)</label>
                        <input type="number" id="duration" value="15" min="1">
                    </div>

                    <button class="btn btn-success" onclick="logSession()">✅ Log Session</button>
                </div>

                <!-- Progress Tab -->
                <div id="progressTab" class="tab-content">
                    <h3 style="margin-bottom: 15px;">Your Progress</h3>
                    <div id="progressContent" class="loading">Loading progress data...</div>
                </div>

                <!-- Predictions Tab -->
                <div id="predictTab" class="tab-content">
                    <h3 style="margin-bottom: 15px;">Recovery Predictions</h3>
                    <div id="predictContent" class="loading">Loading predictions...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';
        let currentPatient = null;

        // Show alert message
        function showAlert(message, type = 'success', elementId = 'alertBox') {
            const alertBox = document.getElementById(elementId);
            alertBox.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                alertBox.innerHTML = '';
            }, 5000);
        }

        // Handle login/register
        async function handleLogin() {
            const patientId = document.getElementById('patientId').value.trim();
            const patientName = document.getElementById('patientName').value.trim();

            if (!patientId || !patientName) {
                showAlert('Please enter both Patient ID and Name', 'error');
                return;
            }

            try {
                // Try to get existing patient
                let response = await fetch(`${API_URL}/patients/${patientId}`);
                
                if (response.ok) {
                    // Patient exists
                    currentPatient = await response.json();
                    showAlert(`Welcome back, ${currentPatient.name}!`, 'success', 'dashboardAlert');
                } else {
                    // Create new patient
                    response = await fetch(`${API_URL}/patients`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            patient_id: patientId,
                            name: patientName
                        })
                    });

                    if (response.ok) {
                        currentPatient = await response.json();
                        showAlert(`Account created! Welcome, ${patientName}!`, 'success', 'dashboardAlert');
                    } else {
                        const error = await response.json();
                        showAlert(error.detail || 'Failed to create account', 'error');
                        return;
                    }
                }

                // Show dashboard
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('dashboardSection').classList.add('active');
                document.getElementById('userName').textContent = currentPatient.name;

                // Load dashboard data
                await loadDashboard();

            } catch (error) {
                console.error('Login error:', error);
                showAlert('Connection error. Make sure backend is running!', 'error');
            }
        }

        // Handle logout
        function handleLogout() {
            currentPatient = null;
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('dashboardSection').classList.remove('active');
            document.getElementById('patientId').value = '';
            document.getElementById('patientName').value = '';
        }

        // Load dashboard data
        async function loadDashboard() {
            try {
                // Get progress data
                const response = await fetch(`${API_URL}/patients/${currentPatient.patient_id}/progress`);
                const data = await response.json();

                if (data.stats) {
                    document.getElementById('totalSessions').textContent = data.stats.total_sessions;
                    document.getElementById('totalReps').textContent = data.stats.total_reps;
                    document.getElementById('currentAngle').textContent = data.stats.current_angle + '°';
                    document.getElementById('improvement').textContent = 
                        (data.stats.improvement_degrees >= 0 ? '+' : '') + data.stats.improvement_degrees + '°';
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        // Log exercise session
        async function logSession() {
            const sessionData = {
                exercise_type: document.getElementById('exerciseType').value,
                reps: parseInt(document.getElementById('reps').value),
                max_angle: parseFloat(document.getElementById('maxAngle').value),
                duration_mins: parseInt(document.getElementById('duration').value)
            };

            try {
                const response = await fetch(`${API_URL}/patients/${currentPatient.patient_id}/sessions`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(sessionData)
                });

                if (response.ok) {
                    const result = await response.json();
                    showAlert(`✅ Session logged! Improvement: ${result.improvement_from_baseline.toFixed(1)}° from baseline`, 'success', 'dashboardAlert');
                    await loadDashboard();
                    
                    // Reset form
                    document.getElementById('reps').value = 10;
                    document.getElementById('maxAngle').value = 120;
                } else {
                    const error = await response.json();
                    showAlert(error.detail || 'Failed to log session', 'error', 'dashboardAlert');
                }
            } catch (error) {
                console.error('Error logging session:', error);
                showAlert('Connection error!', 'error', 'dashboardAlert');
            }
        }

        // Switch tabs
        async function switchTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            // Update tab content
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabName + 'Tab').classList.add('active');

            // Load tab-specific data
            if (tabName === 'progress') {
                await loadProgress();
            } else if (tabName === 'predict') {
                await loadPredictions();
            }
        }

        // Load progress data
        async function loadProgress() {
            try {
                const response = await fetch(`${API_URL}/patients/${currentPatient.patient_id}/sessions`);
                const data = await response.json();

                const contentDiv = document.getElementById('progressContent');
                
                if (data.sessions.length === 0) {
                    contentDiv.innerHTML = '<div class="alert alert-info">No sessions recorded yet. Complete your first exercise!</div>';
                    return;
                }

                let html = '<h4 style="margin-bottom: 15px;">Recent Sessions</h4>';
                data.sessions.reverse().forEach(session => {
                    html += `
                        <div class="session-item">
                            <div>
                                <strong>Session ${session.session_number}</strong><br>
                                <small>${session.date}</small>
                            </div>
                            <div style="text-align: right;">
                                <strong>${session.max_angle.toFixed(1)}°</strong><br>
                                <small>${session.reps} reps</small>
                            </div>
                        </div>
                    `;
                });

                contentDiv.innerHTML = html;
            } catch (error) {
                console.error('Error loading progress:', error);
            }
        }

        // Load predictions
        async function loadPredictions() {
            try {
                const response = await fetch(`${API_URL}/patients/${currentPatient.patient_id}/predict`);
                
                if (!response.ok) {
                    const error = await response.json();
                    document.getElementById('predictContent').innerHTML = 
                        `<div class="alert alert-info">${error.detail}</div>`;
                    return;
                }

                const data = await response.json();

                const html = `
                    <div class="stats-grid" style="margin-top: 20px;">
                        <div class="stat-card">
                            <h3>${data.current_recovery_pct}%</h3>
                            <p>Current Recovery</p>
                        </div>
                        <div class="stat-card">
                            <h3>${data.predicted_recovery_pct}%</h3>
                            <p>Predicted (12 weeks)</p>
                        </div>
                        <div class="stat-card">
                            <h3>${data.expected_improvement_pct >= 0 ? '+' : ''}${data.expected_improvement_pct}%</h3>
                            <p>Expected Gain</p>
                        </div>
                    </div>
                    <div class="alert alert-${data.on_track ? 'success' : 'info'}" style="margin-top: 20px;">
                        <strong>${data.message}</strong>
                    </div>
                `;

                document.getElementById('predictContent').innerHTML = html;
            } catch (error) {
                console.error('Error loading predictions:', error);
            }
        }
    </script>
</body>
</html>
